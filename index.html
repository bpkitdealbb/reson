<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker</title>
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .drawer-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .drawer-content.open { max-height: 2000px; transition: max-height 0.5s ease-in; }
        .table-container { max-height: 400px; overflow: auto; }
        .sticky-header th { position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div id="loadingOverlay" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white p-5 rounded-xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent"></div>
        </div>
    </div>

    <!-- Setup Screen -->
    <div id="setupScreen" class="max-w-md mx-auto mt-12 p-6 bg-white rounded-2xl shadow-md mx-4 hidden">
        <div class="text-center mb-6">
            <i class="fa-solid fa-wallet text-4xl text-indigo-600"></i>
            <h2 class="text-2xl font-bold mt-2">লগইন</h2>
        </div>
        <div class="space-y-4">
            <input type="text" id="setupUrl" class="w-full p-2.5 border rounded-lg outline-none text-sm" placeholder="Google Web App URL">
            <input type="password" id="setupPassword" class="w-full p-2.5 border rounded-lg outline-none text-sm" placeholder="Password">
            <button onclick="saveSetup()" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-semibold shadow">কানেক্ট ও লগইন</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="max-w-md mx-auto hidden px-4 pt-4">
        
        <header class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm mb-4">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-indigo-600 text-xl"></i>
                <span class="font-bold text-gray-800 text-lg">এক্সপেন্স ট্র্যাকার</span>
            </div>
            <button onclick="logout()" class="text-red-500 text-sm font-medium"><i class="fa-solid fa-arrow-right-from-bracket"></i> লগআউট</button>
        </header>

        <!-- Budget Card -->
        <div id="budgetCard" class="bg-gradient-to-br from-indigo-600 to-purple-600 text-white p-5 rounded-2xl shadow-md mb-4 hidden">
            <div class="flex justify-between items-center text-sm mb-1 opacity-90">
                <span>অবশিষ্ট ব্যালেন্স</span><i class="fa-solid fa-scale-balanced"></i>
            </div>
            <div class="text-3xl font-black mb-3">৳ <span id="liveRemaining">0.00</span></div>
            <div class="border-t border-white/20 pt-2 text-xs opacity-90">বাজেট: ৳<span id="liveBudget">0.00</span></div>
        </div>

        <!-- TAB 1: DASHBOARD -->
        <div id="tab-dashboard" class="tab-content active space-y-4">
            <div id="budgetInitForm" class="bg-white p-4 rounded-xl shadow-sm hidden">
                <h3 class="font-bold text-gray-800 mb-2 text-sm">নতুন বাজেট সেট করুন</h3>
                <div class="flex gap-2">
                    <input type="number" id="initBudgetInput" class="flex-1 p-2 border rounded-lg outline-none text-sm" placeholder="৳ পরিমাণ">
                    <button onclick="setInitialBudget()" class="bg-green-600 text-white px-4 rounded-lg text-sm font-bold">সেট করুন</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm">
                <div class="flex justify-between items-center border-b pb-2 mb-2">
                    <h3 class="font-bold text-gray-800 text-sm"><i class="fa-solid fa-cart-shopping text-indigo-600 mr-1"></i> এক সাথে হিসাব</h3>
                    <input type="date" id="expenseEntryDate" class="p-1 border border-gray-300 rounded text-xs font-semibold text-gray-700 outline-none">
                </div>

                <!-- নতুন মেম্বার প্রিসেট বাটন সেকশন -->
                <div id="memberPresetsContainer" class="grid grid-cols-4 gap-2 mb-3 mt-1"></div>
                
                <div id="bulkItemList" class="max-h-72 overflow-y-auto custom-scroll pr-2 divide-y divide-gray-100"></div>

                <div class="mt-4 pt-3 border-t-2 border-dashed border-gray-200">
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold text-gray-700">সর্বমোট বিল:</span>
                        <span class="font-black text-xl text-indigo-700">৳<span id="bulkTotalCalc">0.00</span></span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">প্রকৃত পরিশোধ (৳)</label>
                            <input type="number" id="bulkActualPaid" class="w-full p-2 border rounded-lg bg-gray-50 outline-none text-sm font-bold text-indigo-600">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">অতিরিক্ত খরচ (৳)</label>
                            <input type="number" id="bulkExtraPaid" value="0" class="w-full p-2 border rounded-lg bg-gray-50 outline-none text-sm font-bold text-red-500">
                        </div>
                    </div>
                    <button onclick="submitBulkExpense()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition">সব একসাথে সেভ করুন</button>
                </div>
            </div>
        </div>

        <!-- TAB 2: REPORTS -->
        <div id="tab-reports" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm flex gap-2 items-end">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">মাস নির্বাচন করুন</label>
                    <input type="month" id="reportMonth" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none">
                </div>
                <button onclick="loadReports()" class="bg-indigo-600 text-white p-2 px-4 rounded-lg text-sm font-semibold"><i class="fa-solid fa-search"></i></button>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-purple-500">
                <div>
                    <p class="text-xs text-gray-500 font-semibold">এই মাসের মোট খরচ</p>
                    <h4 class="text-2xl font-black text-gray-800">৳ <span id="reportTotalMonthly">0.00</span></h4>
                </div>
                <i class="fa-solid fa-wallet text-2xl text-purple-300"></i>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-2">
                <h4 class="font-bold text-sm text-gray-700 border-b pb-1"><i class="fa-solid fa-clock text-orange-500 mr-1"></i> দৈনিক খরচ হিস্ট্রি</h4>
                <div id="dailyHistoryList" class="space-y-3 mt-2"></div>
            </div>
        </div>

        <!-- TAB 3: ADMIN PANEL -->
        <div id="tab-admin" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="font-bold text-gray-800 border-b pb-2">ইনভেন্টরি ম্যানেজমেন্ট</h3>
                <div class="flex gap-2">
                    <input type="text" id="newProdName" class="flex-1 p-2 border rounded-lg text-sm outline-none" placeholder="পণ্যের নাম">
                    <input type="number" id="newProdPrice" class="w-24 p-2 border rounded-lg text-sm outline-none" placeholder="৳ দাম">
                    <button onclick="addInventoryRow()" class="bg-green-600 text-white p-2 px-3 rounded-lg text-sm"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="border rounded-lg overflow-hidden">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="bg-gray-50 border-b text-xs uppercase"><tr><th class="p-2">নাম</th><th class="p-2">দাম</th><th class="p-2 text-center">মুছুন</th></tr></thead>
                        <tbody id="inventoryTableBody" class="divide-y"></tbody>
                    </table>
                </div>
                <button onclick="saveInventoryToServer()" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-semibold shadow">ইনভেন্টরি আপডেট করুন</button>
            </div>

            <!-- নতুন মেম্বার প্রিসেট এডিটর সেকশন (অ্যাডমিন প্যানেল) -->
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3">
                <h3 class="font-bold text-gray-800 border-b pb-2"><i class="fa-solid fa-users-gear text-indigo-600 mr-1"></i> সদস্যভিত্তিক প্রিসেট সেটিংস</h3>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">সদস্য প্রিসেট নির্বাচন করুন</label>
                    <select id="adminPresetSelect" onchange="loadPresetToAdminForm()" class="w-full p-2 border rounded-lg text-sm outline-none bg-gray-50 font-bold text-indigo-600">
                        <option value="0">১ সদস্য</option>
                        <option value="1">২ সদস্য</option>
                        <option value="2">৩ সদস্য</option>
                        <option value="3">৪ সদস্য</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">স্থায়ী বিল / প্রকৃত পরিশোধ (৳)</label>
                    <input type="number" id="adminPresetAmount" class="w-full p-2 border rounded-lg text-sm outline-none font-bold text-green-600" placeholder="৳ ফিক্সড টাকা">
                </div>
                <div class="border rounded-lg overflow-hidden">
                    <div class="bg-gray-50 px-3 py-1.5 border-b text-xs font-bold text-gray-600">আইটেম অনুযায়ী কেজি প্রিসেট</div>
                    <div id="adminPresetItemsContainer" class="p-2 space-y-2 max-h-48 overflow-y-auto custom-scroll divide-y"></div>
                </div>
                <button onclick="savePresetConfigToServer()" class="w-full bg-purple-600 text-white p-2.5 rounded-lg font-semibold shadow hover:bg-purple-700 transition">প্রিসেট ডাটা আপডেট করুন</button>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg max-w-md mx-auto flex justify-around py-2 z-40 rounded-t-xl">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-0.5 text-indigo-600 font-semibold text-xs"><i class="fa-solid fa-house text-lg"></i> ড্যাশবোর্ড</button>
            <button onclick="switchTab('reports')" id="nav-reports" class="flex flex-col items-center gap-0.5 text-gray-400 text-xs"><i class="fa-solid fa-chart-simple text-lg"></i> রিপোর্টস</button>
            <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-0.5 text-gray-400 text-xs"><i class="fa-solid fa-gear text-lg"></i> অ্যাডমিন</button>
        </nav>

    </div>

    <script>
        let globalInventory = [];
        let globalPresets = []; // প্রিসেট ডাটা সংরক্ষণের জন্য গ্লোবাল ভেরিয়েবল
        let globalBudgetState = { hasEntries: false, startingBudget: 0, remainingBalance: 0 };

        window.addEventListener('load', () => {
            const now = new Date();
            document.getElementById('reportMonth').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('expenseEntryDate').value = now.toISOString().split('T')[0];
            
            if (localStorage.getItem('gas_url')) { showApp(); refreshDashboard(); } 
            else showSetup();
        });

        function toggleLoader(show) { document.getElementById('loadingOverlay').classList.toggle('hidden', !show); }
        function showSetup() { document.getElementById('setupScreen').classList.remove('hidden'); document.getElementById('appContainer').classList.add('hidden'); }
        function showApp() { document.getElementById('setupScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden'); }

        async function saveSetup() {
            const url = document.getElementById('setupUrl').value.trim();
            const pass = document.getElementById('setupPassword').value.trim();
            if (!url || !pass) return alert("তথ্য দিন।");
            localStorage.setItem('gas_url', url); localStorage.setItem('gas_password', pass);
            showApp(); refreshDashboard();
        }

        function logout() { if(confirm("লগআউট করবেন?")) { localStorage.clear(); showSetup(); } }

        async function callApi(action, data = {}) {
            try {
                const res = await fetch(localStorage.getItem('gas_url'), {
                    method: 'POST', body: JSON.stringify({ action, password: localStorage.getItem('gas_password'), ...data })
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.error);
                return result;
            } catch (err) { alert("ত্রুটি: " + err.message); return null; }
        }

        async function refreshDashboard() {
            toggleLoader(true);
            const res = await callApi('get_dashboard');
            toggleLoader(false);
            if (res) {
                globalInventory = res.inventory;
                globalPresets = res.memberPresets || [];
                globalBudgetState = res.todaySummary;
                
                renderBulkList();
                renderMemberButtons(); // বাটন রেন্ডার করা হলো
                renderInventoryTable();
                loadPresetToAdminForm(); // অ্যাডমিন প্রিসেট ফর্ম লোড
                updateBudgetUI();
            }
        }

        function updateBudgetUI() {
            if (globalBudgetState.hasEntries) {
                document.getElementById('budgetCard').classList.remove('hidden');
                document.getElementById('budgetInitForm').classList.add('hidden');
                document.getElementById('liveBudget').innerText = globalBudgetState.startingBudget.toFixed(2);
                document.getElementById('liveRemaining').innerText = globalBudgetState.remainingBalance.toFixed(2);
            } else {
                document.getElementById('budgetCard').classList.add('hidden');
                document.getElementById('budgetInitForm').classList.remove('hidden');
            }
        }

        function setInitialBudget() {
            const b = Number(document.getElementById('initBudgetInput').value);
            if(b > 0) { globalBudgetState.startingBudget = b; globalBudgetState.remainingBalance = b; globalBudgetState.hasEntries = true; updateBudgetUI(); }
        }

        function renderBulkList() {
            const container = document.getElementById('bulkItemList');
            container.innerHTML = globalInventory.map(item => `
                <div class="flex justify-between items-center py-2.5">
                    <div class="w-2/5 leading-tight">
                        <div class="font-bold text-gray-700 text-sm">${item.itemName}</div>
                        <div class="text-xs text-gray-400">৳${item.unitPrice} / কেজি</div>
                    </div>
                    <div class="w-1/4">
                        <input type="number" step="0.01" min="0" class="kg-input w-full p-1.5 border border-gray-300 rounded text-center text-sm outline-none focus:border-indigo-500" 
                            data-name="${item.itemName}" data-price="${item.unitPrice}" placeholder="কেজি" oninput="calculateBulkTotal(true)">
                    </div>
                    <div class="w-1/4 text-right">
                        <div class="font-bold text-indigo-600 text-sm">৳<span class="row-total">0</span></div>
                    </div>
                </div>
            `).join('');
            calculateBulkTotal(false);
        }

        // মেম্বার বাটন রেন্ডার করার লজিক
        function renderMemberButtons() {
            const container = document.getElementById('memberPresetsContainer');
            container.innerHTML = globalPresets.map((preset, index) => `
                <button onclick="applyMemberPreset(${index})" class="bg-indigo-50 text-indigo-700 border border-indigo-200 py-1.5 px-1 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition shadow-sm">
                    ${preset.name}
                </button>
            `).join('');
        }

        // মেম্বার বাটনে ক্লিক করলে যা ঘটবে
        function applyMemberPreset(index) {
            const preset = globalPresets[index];
            if (!preset) return;

            document.querySelectorAll('.kg-input').forEach(input => {
                const itemName = input.getAttribute('data-name');
                const qty = preset.quantities[itemName];
                input.value = (qty && qty > 0) ? qty : ''; // প্রিসেটের কেজি সেট হবে
            });

            // রো এবং সাবটোটাল বিল ক্যালকুলেশন
            let grandTotal = 0;
            document.querySelectorAll('.kg-input').forEach(input => {
                let qty = Number(input.value) || 0;
                let price = Number(input.getAttribute('data-price'));
                let rowTotal = qty * price;
                input.parentElement.nextElementSibling.querySelector('.row-total').innerText = rowTotal > 0 ? rowTotal.toFixed(2) : '0';
                grandTotal += rowTotal;
            });
            
            document.getElementById('bulkTotalCalc').innerText = grandTotal.toFixed(2);
            // আপনার রিকোয়েস্ট অনুযায়ী প্রকৃত পরিশোধে ফিক্সড টাকা বসে যাবে
            document.getElementById('bulkActualPaid').value = preset.fixedAmount > 0 ? preset.fixedAmount.toFixed(2) : '';
        }

        // কাস্টম ইনপুট চেঞ্জ বা এডিট হলে রিক্যালকুলেশন লজিক
        function calculateBulkTotal(isUserInput = false) {
            let grandTotal = 0;
            document.querySelectorAll('.kg-input').forEach(input => {
                let qty = Number(input.value) || 0;
                let price = Number(input.getAttribute('data-price'));
                let rowTotal = qty * price;
                input.parentElement.nextElementSibling.querySelector('.row-total').innerText = rowTotal > 0 ? rowTotal.toFixed(2) : '0';
                grandTotal += rowTotal;
            });
            document.getElementById('bulkTotalCalc').innerText = grandTotal.toFixed(2);
            
            // বাটন প্রেসের পর এডিট করলে প্রকৃত পরিশোধ আবার নতুন করে ক্যালকুলেট হবে
            if (isUserInput) {
                document.getElementById('bulkActualPaid').value = grandTotal > 0 ? grandTotal.toFixed(2) : '';
            }
        }

        async function submitBulkExpense() {
            if (!globalBudgetState.hasEntries) return alert("আগে বাজেট সেট করুন।");
            const entryDate = document.getElementById('expenseEntryDate').value;
            if(!entryDate) return alert("দয়া করে একটি তারিখ নির্বাচন করুন।");
            
            let selectedItems = [];
            document.querySelectorAll('.kg-input').forEach(input => {
                let qty = Number(input.value);
                if (qty > 0) selectedItems.push({ name: input.getAttribute('data-name'), qty: qty, price: Number(input.getAttribute('data-price')) });
            });
            
            if(selectedItems.length === 0) return alert("অন্তত একটি আইটেমের পরিমাণ (কেজি) দিন।");
            
            let totalActualPaid = Number(document.getElementById('bulkActualPaid').value) || 0;
            let totalExtraPaid = Number(document.getElementById('bulkExtraPaid').value) || 0;
            
            let payloadItems = [];
            let distributedActual = 0;
            
            selectedItems.forEach((item, index) => {
                let calc = item.qty * item.price;
                let isLast = (index === selectedItems.length - 1);
                let rowActual = isLast ? (totalActualPaid - distributedActual) : calc;
                let rowExtra = isLast ? totalExtraPaid : 0;
                if(!isLast) distributedActual += calc;

                payloadItems.push({ item: item.name, quantity: item.qty, calculatedPrice: calc, actualPaid: rowActual, extraPaid: rowExtra });
            });

            toggleLoader(true);
            const res = await callApi('add_bulk_expense', { startingBudget: globalBudgetState.startingBudget, entryDate: entryDate, items: payloadItems });
            toggleLoader(false);

            if(res) {
                alert(res.message);
                document.getElementById('bulkExtraPaid').value = '0';
                refreshDashboard();
            }
        }

        function renderInventoryTable() {
            document.getElementById('inventoryTableBody').innerHTML = globalInventory.map((item, i) => `
                <tr class="border-b"><td class="p-2"><input type="text" value="${item.itemName}" class="bg-transparent w-full" onchange="globalInventory[${i}].itemName=this.value"></td>
                <td class="p-2"><input type="number" value="${item.unitPrice}" class="bg-transparent w-full font-medium" onchange="globalInventory[${i}].unitPrice=Number(this.value)"></td>
                <td class="p-2 text-center"><button onclick="globalInventory.splice(${i},1); renderInventoryTable()" class="text-red-500"><i class="fa-solid fa-trash"></i></button></td></tr>
            `).join('');
        }

        function addInventoryRow() {
            const name = document.getElementById('newProdName').value, price = Number(document.getElementById('newProdPrice').value);
            if(!name || !price) return alert("সঠিক তথ্য দিন।");
            globalInventory.push({ itemName: name, unitPrice: price });
            document.getElementById('newProdName').value = ''; document.getElementById('newProdPrice').value = ''; renderInventoryTable();
        }

        async function saveInventoryToServer() {
            if(!confirm("আপডেট করবেন?")) return;
            toggleLoader(true);
            const res = await callApi('update_inventory', { items: globalInventory });
            toggleLoader(false);
            if(res) { alert(res.message); refreshDashboard(); }
        }

        // অ্যাডমিন প্যানেলে প্রিসেট সেটিংস লোড করা
        function loadPresetToAdminForm() {
            const idx = document.getElementById('adminPresetSelect').value;
            const preset = globalPresets[idx];
            if (!preset) return;

            document.getElementById('adminPresetAmount').value = preset.fixedAmount || '';
            const container = document.getElementById('adminPresetItemsContainer');
            
            container.innerHTML = globalInventory.map(item => {
                const currentQty = preset.quantities[item.itemName] || '';
                return `
                    <div class="flex justify-between items-center py-1.5 text-sm">
                        <span class="font-bold text-gray-700">${item.itemName}</span>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.01" class="admin-preset-qty-input p-1 border rounded w-20 text-center text-xs font-semibold outline-none" 
                                data-name="${item.itemName}" value="${currentQty}" placeholder="0">
                            <span class="text-xs text-gray-400">কেজি</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // অ্যাডমিন প্যানেল থেকে প্রিসেট ডাটা সার্ভারে আপডেট করা
        async function savePresetConfigToServer() {
            const idx = document.getElementById('adminPresetSelect').value;
            const amount = Number(document.getElementById('adminPresetAmount').value) || 0;

            const quantities = {};
            document.querySelectorAll('.admin-preset-qty-input').forEach(input => {
                const name = input.getAttribute('data-name');
                const val = Number(input.value) || 0;
                if(val > 0) quantities[name] = val;
            });

            globalPresets[idx].fixedAmount = amount;
            globalPresets[idx].quantities = quantities;

            toggleLoader(true);
            const res = await callApi('update_member_presets', { presets: globalPresets });
            toggleLoader(false);
            if(res) { alert(res.message); refreshDashboard(); }
        }

        window.toggleDrawer = function(index) {
            const content = document.getElementById(`drawer-content-${index}`);
            const icon = document.getElementById(`drawer-icon-${index}`);
            if(content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        async function loadReports() {
            const month = document.getElementById('reportMonth').value;
            if(!month) return;
            toggleLoader(true);
            const res = await callApi('get_reports', { month });
            toggleLoader(false);
            
            if(res) {
                document.getElementById('reportTotalMonthly').innerText = res.totalMonthlyExpense.toFixed(2);
                const groupedByDate = {};
                res.dailyHistory.forEach(record => {
                    if(!groupedByDate[record.date]) groupedByDate[record.date] = {};
                    if(!groupedByDate[record.date][record.txId]) groupedByDate[record.date][record.txId] = [];
                    groupedByDate[record.date][record.txId].push(record);
                });

                let drawersHtml = '';
                let drawerIndex = 0;

                for (const [date, transactions] of Object.entries(groupedByDate)) {
                    drawerIndex++;
                    let dayTotal = 0;
                    let tableRowsHtml = '';
                    let serialNo = 1;

                    let tableHeadHtml = `<th class="p-2 border-r border-gray-400 min-w-[50px] whitespace-nowrap bg-indigo-100 font-bold">ক্রমিক<br>নং</th>`;
                    globalInventory.forEach(invItem => {
                        tableHeadHtml += `<th class="p-2 border-r border-gray-400 min-w-[60px] whitespace-nowrap bg-indigo-100 font-bold">${invItem.itemName}<br><span class="text-[10px] font-normal text-gray-600">কেজি</span></th>`;
                    });

                    for (const [txId, records] of Object.entries(transactions)) {
                        let txNetTotal = 0;
                        let txActualTotal = 0;
                        const boughtItems = {};
                        
                        records.forEach(r => {
                            boughtItems[r.item] = r.quantity;
                            txNetTotal += r.calculatedPrice;
                            txActualTotal += r.totalPaid;
                            dayTotal += r.totalPaid;
                        });

                        tableRowsHtml += `<tr class="border-b border-gray-400 bg-white">
                            <td class="p-2 text-center border-r border-gray-400 font-black text-gray-800 text-sm">${serialNo}</td>`;
                        
                        globalInventory.forEach(invItem => {
                            const qty = boughtItems[invItem.itemName] || 0;
                            const textClass = qty > 0 ? "font-bold text-indigo-700" : "text-gray-400";
                            tableRowsHtml += `<td class="p-2 text-center border-r border-gray-400 text-sm ${textClass}">${qty}</td>`;
                        });
                        tableRowsHtml += `</tr>`;

                        const totalColumns = globalInventory.length + 1;
                        tableRowsHtml += `
                        <tr class="border-b-[3px] border-gray-800 bg-gray-50">
                            <td colspan="${totalColumns}" class="p-2 text-center text-xs font-bold text-gray-800">
                                <span class="inline-block border border-gray-500 rounded px-2 py-1 mr-2 bg-white">(নিট টাকা = ${txNetTotal.toFixed(0)})</span>
                                <span class="inline-block border border-gray-500 rounded px-2 py-1 bg-white">(আসল টাকা = ${txActualTotal.toFixed(0)})</span>
                            </td>
                        </tr>`;
                        serialNo++;
                    }

                    drawersHtml += `
                        <div class="border border-indigo-100 bg-white rounded-xl shadow-sm overflow-hidden mb-3">
                            <button onclick="toggleDrawer(${drawerIndex})" class="w-full flex justify-between items-center p-3.5 bg-indigo-50/50 hover:bg-indigo-100 transition focus:outline-none">
                                <div class="flex items-center gap-2">
                                    <i class="fa-regular fa-calendar-check text-indigo-600 text-lg"></i>
                                    <span class="font-bold text-gray-800 tracking-wide">${date}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-black text-indigo-700 text-base">৳${dayTotal.toFixed(2)}</span>
                                    <i id="drawer-icon-${drawerIndex}" class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-300"></i>
                                </div>
                            </button>
                            
                            <div id="drawer-content-${drawerIndex}" class="drawer-content bg-white">
                                <div class="p-2">
                                    <div class="table-container border-2 border-gray-800 rounded-lg custom-scroll">
                                        <table class="w-full text-left border-collapse">
                                            <thead class="sticky-header text-xs text-gray-800 uppercase text-center border-b-2 border-gray-800">
                                                <tr>${tableHeadHtml}</tr>
                                            </thead>
                                            <tbody>
                                                ${tableRowsHtml}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('dailyHistoryList').innerHTML = drawersHtml || '<div class="text-center text-gray-400 py-6 font-medium border-2 border-dashed border-gray-200 rounded-xl">এই মাসে কোনো হিসাব নেই</div>';
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => { btn.classList.remove('text-indigo-600', 'font-semibold'); btn.classList.add('text-gray-400'); });
            const activeNav = document.getElementById(`nav-${tabId}`);
            activeNav.classList.remove('text-gray-400'); activeNav.classList.add('text-indigo-600', 'font-semibold');
            if(tabId === 'reports') loadReports();
        }

        if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    </script>
</body>
</html>
